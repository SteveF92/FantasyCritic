
services:
  mysql:
    image: mysql:8.4
    container_name: fantasycritic-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fantasycritic
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init-multiple-users.sql:/docker-entrypoint-initdb.d/01-multiple-users.sql:ro
    # Keep auth + charset compatible with typical MySQL client expectations.
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_0900_ai_ci"
      - "--require_secure_transport=ON"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --ssl-mode=REQUIRED"
      interval: 5s
      timeout: 5s
      retries: 20

  database-updater:
    container_name: fantasycritic-database-updater
    build:
      context: ../src
      dockerfile: FantasyCritic.DatabaseUpdater/Dockerfile
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Development skips AWS Secrets Manager (same pattern as web in docker-compose-complete).
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AdminConnection: "Server=mysql;Port=3306;Database=fantasycritic;Uid=fantasycritic-admin;Pwd=anotherfantasticpassword;SslMode=required;charset=utf8;"
    volumes:
      # Mount scripts from the host so new/changed SQL files are picked up without
      # rebuilding the image. GetScriptsRoot() resolves /app/Scripts first.
      - ../src/FantasyCritic.DatabaseUpdater/Scripts:/app/Scripts:ro

  master-game-updater:
    container_name: fantasycritic-master-game-updater
    build:
      context: ../src
      dockerfile: FantasyCritic.MasterGameUpdater/Dockerfile
    restart: "no"
    depends_on:
      database-updater:
        condition: service_completed_successfully
    environment:
      localConnectionString: "Server=mysql;Port=3306;Database=fantasycritic;Uid=fantasycritic;Pwd=afantasticpassword;SslMode=required;charset=utf8;"
      baseAddress: "https://www.fantasycritic.games"
      addedByUserIDOverride: "00000000-0000-0000-0000-000000000000"

volumes:
  mysql_data:
